<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>3D Shooter Game</title>
	<style>
	body {
		margin: 0;
		overflow: hidden;
		font-family: Arial, sans-serif;
	}

	#gameCanvas {
		display: block;
		width: 100%;
		height: 100vh;
	}

	/* 1. HUD Top Row: Flexbox makes feedback follow score */
	#hud-top {
		position: absolute;
		top: 20px;
		left: 20px;
		display: flex;
		align-items: center;
		gap: 25px;
		pointer-events: none;
	}

	#score {
		color: white;
		font-size: 24px;
		text-shadow: 2px 2px 4px black;
		white-space: nowrap;
	}

	#feedback {
		color: yellow;
		font-size: 20px;
		text-shadow: 2px 2px 4px black;
		font-weight: bold;
	}

	/* 2. Instructions + Powerup Stack */
	#instructions-container {
		position: absolute;
		top: 60px;
		left: 20px;
		display: flex;
		flex-direction: column;
		gap: 8px;
		pointer-events: none;
	}

	#instructions {
		color: white;
		font-size: 16px;
		text-shadow: 2px 2px 4px black;
	}

	#powerup {
		color: #00ffff;
		font-size: 18px;
		font-weight: bold;
		text-shadow: 2px 2px 4px black;
	}

	/* 3. Menus */
	#gameOver,
	#pauseMenu {
		position: absolute;
		top: 50%;
		left: 50%;
		transform: translate(-50%, -50%);
		color: white;
		font-size: 48px;
		text-shadow: 3px 3px 6px black;
		display: none;
		text-align: center;
	}

	#restartBtn,
	#resumeBtn {
		font-size: 24px;
		padding: 15px 30px;
		margin-top: 20px;
		cursor: pointer;
		color: white;
		border: none;
		border-radius: 10px;
	}

	#restartBtn {
		background: #ff4444;
	}

	#resumeBtn {
		background: #44ff44;
	}
	</style>
</head>

		<div id="score">Score: 0</div>
		<div id="feedback"></div>
	</div>

	const groundTexture = loader.load('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTf4DCKCdjqh4bR4n1J1hKZpeKH9avFrDXQDA&s');

	const ground = new THREE.Mesh(groundGeometry, groundMaterial);
	ground.rotation.x = -Math.PI / 2;
	ground.receiveShadow = true;
	scene.add(ground);

		color: 0xffff00,
		side: THREE.DoubleSide
	});
	const boundaryLine = new THREE.Mesh(lineGeometry, lineMaterial);
	boundaryLine.rotation.x = -Math.PI / 2;
	boundaryLine.position.y = 0.05;
	scene.add(boundaryLine);
	// Add light
	const light = new THREE.DirectionalLight(0xffffff, 1);
	light.position.set(5, 10, 5);
	light.castShadow = true;
	scene.add(light);
	const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
	scene.add(ambientLight);

	camera.position.z = 5;
	camera.position.y = 2;

	const gunGroup = new THREE.Group();
	const barrelGeometry = new THREE.BoxGeometry(0.1, 0.1, 0.8);
	const barrelMaterial = new THREE.MeshLambertMaterial({
		color: 0x333333
	});
	const barrel = new THREE.Mesh(barrelGeometry, barrelMaterial);
	barrel.position.z = 0.4; // Point forward instead of backward

	const handleMaterial = new THREE.MeshLambertMaterial({
		color: 0x555555
	});
	const handle = new THREE.Mesh(handleGeometry, handleMaterial);
	handle.position.y = -0.15;
	handle.position.z = -0.1; // Move handle behind barrel
	gunGroup.add(barrel);
	gunGroup.add(handle);
	gunGroup.position.set(0.3, -0.3, -1);
	camera.add(gunGroup);
	scene.add(camera);
	// Game variables
	let isPowerUpActive = false;
	let score = 0;
	let lives = 10
	let maxScore = 0;
	let enemies = [];
	let bullets = [];
	let canShoot = true;
	let gameRunning = true;
	let gamePaused = false;
	let spawnInterval = 2000;
	let spawnTimer = null;
	let enemySpeed = 0.08;
	const TARGET_DISTANCE = 10;
	let isSlowMo = false;
	let enemiesDefeated = 0;
	const KILLS_REQUIRED = 15;
	const enemyTextures = [ 'https://images.pexels.com/photos/13578248/pexels-photo-13578248.jpeg', 'https://images.pexels.com/photos/7767506/pexels-photo-7767506.jpeg', 'https://images.pexels.com/photos/35849577/pexels-photo-35849577.jpeg'];
	const geometry = new THREE.SphereGeometry(0.5, 16, 16);
	const enemyMaterials = enemyTextures.map(url => {
		return new THREE.MeshLambertMaterial({
			map: loader.load(url)
		});
	});
	// Enemy class
	function createEnemy() {
		if(!gameRunning) return;
		const randomMaterial = enemyMaterials[Math.floor(Math.random() * enemyMaterials.length)];
		const enemy = new THREE.Mesh(geometry, randomMaterial);
		// Random spawn position in 30 degree cone in front of camera
		const coneAngle = 30 * (Math.PI / 180);
		const randomAngle = (Math.random() - 0.5) * coneAngle;
		const angle = -Math.PI / 2 + randomAngle;
		const distance = 30;
		enemy.position.x = Math.cos(angle) * distance;
		enemy.position.y = 0.5;
		enemy.position.z = Math.sin(angle) * distance;
		enemy.castShadow = true;
		enemy.alive = true;
		scene.add(enemy);
		enemies.push(enemy);
	}
	// Spawn system with increasing difficulty based on score
	function startSpawning() {
		if(spawnTimer) clearInterval(spawnTimer);
		// Calculate difficulty based on score
		const difficulty = Math.floor(score / 20);
		spawnInterval = Math.max(100, 2000 - difficulty * 150);
		enemySpeed = 0.08 + difficulty * 0.05;
		spawnTimer = setInterval(() => {
			createEnemy();
			startSpawning(); // Recalculate based on current score
		}, spawnInterval);
	}
	// Gun recoil animation
	function recoilGun() {
		gunGroup.position.z = -0.8;
		setTimeout(() => {
			gunGroup.position.z = -1;
		}, 100);
	}
	// Game over
	function endGame() {
		gameRunning = false;
		if(spawnTimer) clearInterval(spawnTimer);
		document.getElementById('gameOver').style.display = 'block';
		document.getElementById('finalScore').textContent = 'Max Score Reached: ' + maxScore;
	}
	// Restart game
	document.getElementById('restartBtn').addEventListener('click', () => {
		location.reload();
	});
	// Pause/Resume game
	function togglePause() {
		if(!gameRunning) return;
		gamePaused = !gamePaused;
		if(gamePaused) {
			document.getElementById('pauseMenu').style.display = 'block';
			if(spawnTimer) clearInterval(spawnTimer);
		} else {
			document.getElementById('pauseMenu').style.display = 'none';
			startSpawning();
		}
	}
	document.getElementById('resumeBtn').addEventListener('click', togglePause);

	function activatePowerUp() {
		isSlowMo = true;
		// Target the specific powerup ID under instructions
		document.getElementById('powerup').textContent = "POWER UP: TIME SLOWED!";
		setTimeout(() => {
			isSlowMo = false;
			document.getElementById('powerup').textContent = ""; // Clear only powerup text
		}, 5000);
	}
	// Shoot function
	function shoot() {
		if(!canShoot || !gameRunning || gamePaused) return;
		canShoot = false;
		setTimeout(() => {
			canShoot = true;
		}, 1);
		const bulletGeo = new THREE.SphereGeometry(0.1);
		const bulletMat = new THREE.MeshBasicMaterial({
			color: 0xffffff
		});
		recoilGun();
		// Find closest enemy to player
		let closestEnemy = null;
		let closestDistance = Infinity;
		enemies.forEach(enemy => {
			if(enemy.alive) {
				const dist = enemy.position.distanceTo(camera.position);
				if(dist < closestDistance) {
					closestDistance = dist;
					closestEnemy = enemy;
				}
			}
		});
		if(closestEnemy) {
			closestEnemy.alive = false;
			const targetToRemove = closestEnemy;
			// 3. Delayed logic using the stored reference
			setTimeout(() => {
				scene.remove(targetToRemove);
				// Clean up geometry and material to save browser memory
				targetToRemove.geometry.dispose();
				targetToRemove.material.dispose();
			}, 250); // 0.25 seconds
			enemiesDefeated++;
			if(enemiesDefeated >= KILLS_REQUIRED) {
				activatePowerUp();
				enemiesDefeated = 0; // Reset the counter
			}
			enemies = enemies.filter(e => e !== closestEnemy);
			// Calculate score based on distance from target line
			const distanceFromTarget = Math.abs(closestDistance - TARGET_DISTANCE);
			// +30 points at perfect center, decreasing to +1 at far distances
			let points = Math.max(1, Math.round(30 - distanceFromTarget * 3));
			let feedback = '';
			if(distanceFromTarget < 0.3) {
				feedback = 'PERFECT! +' + points;
			} else if(distanceFromTarget < 1) {
				feedback = 'Great! +' + points;
			} else if(distanceFromTarget < 2) {
				feedback = 'Good +' + points;
			} else {
				feedback = 'Hit +' + points;
			}
			const bullet = new THREE.Mesh(bulletGeo, bulletMat);
			bullet.position.copy(camera.position);
			// Calculate direction
			const direction = new THREE.Vector3(0, 0, -1); // Default: Straight ahead
			if(closestEnemy) {
				direction.subVectors(closestEnemy.position, camera.position).normalize();
			}
			direction.applyQuaternion(camera.quaternion); // Align with camera rotation
			bullet.velocity = direction.multiplyScalar(0.8); // Set speed to 0.8
			scene.add(bullet);
			bullets.push(bullet);
			score += points;
			if(score > maxScore) {
				maxScore = score;
			}
			document.getElementById('score').textContent = 'Score: ' + score + ' | Lives: ' + lives;
			document.getElementById('feedback').textContent = feedback;
			setTimeout(() => {
				document.getElementById('feedback').textContent = '';
			}, 1000);
		}
	}
	// Keyboard input
	document.addEventListener('keydown', (e) => {
		if(e.code === 'Space') {
			e.preventDefault();
			shoot();
		}
		if(e.code === 'Escape') {
			e.preventDefault();
			togglePause();
		}
		if(e.code === 'ShiftLeft') {
			isSlowMo = !isSlowMo;
			document.getElementById('feedback').textContent = isSlowMo ? 'TIME SLOWED' : 'TIME NORMAL';
		}
	});
	// Start spawning enemies
	startSpawning();
	// Animation loop
	function animate() {
		requestAnimationFrame(animate);
		if(!gameRunning || gamePaused) {
			renderer.render(scene, camera);
			return;
		}
		bullets.forEach((bullet, index) => {
			bullet.position.add(bullet.velocity);
			//Remove bullets that travel too far to save memory
			if(bullet.position.distanceTo(camera.position) > 50) {
				scene.remove(bullet);
				bullets.splice(index, 1);
			}
		});
		// Find closest enemy for gun aiming
		let closestEnemy = null;
		let closestDistance = Infinity;
		enemies.forEach(enemy => {
			if(enemy.alive) {
				const dist = enemy.position.distanceTo(camera.position);
				if(dist < closestDistance) {
					closestDistance = dist;
					closestEnemy = enemy;
				}
			}
		});
		// Point gun at closest enemy
		if(closestEnemy) {
			const targetPos = closestEnemy.position.clone();
			const cameraWorldPos = new THREE.Vector3();
			camera.getWorldPosition(cameraWorldPos);
			// Calculate direction vector from camera to target
			const direction = new THREE.Vector3();
			direction.subVectors(targetPos, cameraWorldPos);
			// Calculate angles
			const horizontalAngle = Math.atan2(direction.x, direction.z);
			const verticalAngle = Math.atan2(direction.y, Math.sqrt(direction.x * direction.x + direction.z * direction.z));
			// Apply rotation to gun (positive vertical angle means point down)
			gunGroup.rotation.y = horizontalAngle;
			gunGroup.rotation.x = verticalAngle;
		}
		// Move enemies toward player
		enemies.forEach(enemy => {
			if(enemy.alive) {
				const direction = new THREE.Vector3();
				direction.subVectors(camera.position, enemy.position);
				direction.normalize();
				const currentSpeed = isSlowMo ? enemySpeed * 0.2 : enemySpeed;
				enemy.position.x += direction.x * currentSpeed;
				enemy.position.z += direction.z * currentSpeed;
				// Update enemy color based on distance from target line
				const distFromPlayer = enemy.position.distanceTo(camera.position);
				const distFromLine = Math.abs(distFromPlayer - TARGET_DISTANCE);
				// Color transitions from red -> yellow (at line) -> red
				// Maximum yellow when within 2 units of the line
				const yellowness = Math.max(0, 1 - distFromLine / 3);
				const red = 1;
				const green = yellowness;
				const blue = 0;
				// Check if enemy hit the player
				if(enemy.position.distanceTo(camera.position) < 2) {
					scene.remove(enemy);
					enemies = enemies.filter(e => e !== enemy);
					lives -= 1;
					document.getElementById('score').textContent = 'Score: ' + score + ' | Lives: ' + lives;
					document.getElementById('score').textContent = 'Score: ' + score + ' | Lives: ' + lives;
					document.getElementById('feedback').textContent = 'Youre HIT! -1 life';
					document.getElementById('feedback').style.color = 'red';
					setTimeout(() => {
						document.getElementById('feedback').textContent = '';
						document.getElementById('feedback').style.color = 'yellow';
					}, 1000);
					// Check for game over
					if(lives <= 0) {
						endGame();
					}
				}
			}
		});
		renderer.render(scene, camera);
	}
	// Handle window resize
	window.addEventListener('resize', () => {
		camera.aspect = window.innerWidth / window.innerHeight;
		camera.updateProjectionMatrix();
		renderer.setSize(window.innerWidth, window.innerHeight);
	});
	// Start game
	animate();
	</script>
</body>
